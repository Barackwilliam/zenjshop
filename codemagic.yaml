workflows:
  android-release:
    name: ZenjShop Android Build
    max_build_duration: 30
    environment:
      flutter: 3.29.3
      java: 17
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk